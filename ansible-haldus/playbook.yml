---
- name: Linuxi serverite baashaldus ja turvamine
  hosts: linux_serverid
  gather_facts: yes
  become: yes

  vars:
    hkhk_ssh_key: "ssh-rsa  kasutaja@Ubuntusrv"

  tasks:
    - name: Tuvasta administraatori grupp vastavalt distrole
      set_fact:
        admin_group: "{{ 'wheel' if ansible_facts['os_family'] == 'RedHat' else 'sudo' }}"

    - name: Loo kasutaja hkhk
      user:
        name: hkhk
        shell: /bin/bash
        groups: "{{ admin_group }}"
        append: yes
        state: present

    - name: Seadista SSH avalik võti kasutajale hkhk
      authorized_key:
        user: hkhk
        state: present
        key: "{{ hkhk_ssh_key }}"

    - name: Seadista paroolita sudo reegel
      copy:
        content: "hkhk ALL=(ALL) NOPASSWD:ALL"
        dest: /etc/sudoers.d/hkhk
        mode: '0440'
        validate: /usr/sbin/visudo -cf %s

    - name: Muuda SSH konfiguratsiooni (Turvalisus)
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
        state: present
      loop:
        - { regexp: '^#?PasswordAuthentication', line: 'PasswordAuthentication no' }
        - { regexp: '^#?PermitRootLogin', line: 'PermitRootLogin no' }
      notify: Taaskaiwita SSH teenus

  handlers:
    - name: Taaskaiwita SSH teenus
      service:
        name: "{{ 'ssh' if ansible_facts['os_family'] == 'Debian' else 'sshd' }}"
        state: restarted
